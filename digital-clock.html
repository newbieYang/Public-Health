<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock - Multiple Time Zones</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
        }

        .clock {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .clock:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .timezone-name {
            font-size: 1.1em;
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
        }

        .time-display {
            font-size: 2.5em;
            color: white;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .date-display {
            font-size: 0.9em;
            color: #e0e0e0;
            margin-top: 10px;
        }

        .separator {
            display: inline-block;
            width: 4px;
            height: 40px;
            background: #ffd700;
            margin: 0 5px;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 49%, 100% {
                opacity: 1;
            }
            50%, 99% {
                opacity: 0.3;
            }
        }

        .controls {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        .footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 20px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 20px;
            }

            .time-display {
                font-size: 2em;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 World Clock</h1>
        
        <div class="clocks-grid" id="clocks-container">
            <!-- Clocks will be generated by JavaScript -->
        </div>

        <div class="controls">
            <button onclick="addCustomTimezone()">+ Add Custom Timezone</button>
            <button onclick="resetToDefault()">Reset to Default</button>
        </div>

        <div class="footer">
            <p>All times update every second</p>
        </div>
    </div>

    <script>
        // Default timezones
        const defaultTimezones = [
            { name: 'London', tz: 'Europe/London' },
            { name: 'New York', tz: 'America/New_York' },
            { name: 'Tokyo', tz: 'Asia/Tokyo' },
            { name: 'Sydney', tz: 'Australia/Sydney' },
            { name: 'Dubai', tz: 'Asia/Dubai' },
            { name: 'Singapore', tz: 'Asia/Singapore' },
            { name: 'Los Angeles', tz: 'America/Los_Angeles' },
            { name: 'Mumbai', tz: 'Asia/Kolkata' },
            { name: 'São Paulo', tz: 'America/Sao_Paulo' },
            { name: 'Hong Kong', tz: 'Asia/Hong_Kong' },
            { name: 'Frankfurt', tz: 'Europe/Berlin' },
            { name: 'Toronto', tz: 'America/Toronto' }
        ];

        let customTimezones = [];

        // Initialize
        function init() {
            loadCustomTimezones();
            renderClocks();
            updateClocks();
            setInterval(updateClocks, 1000);
        }

        // Render clock elements
        function renderClocks() {
            const container = document.getElementById('clocks-container');
            container.innerHTML = '';

            const allTimezones = [...defaultTimezones, ...customTimezones];

            allTimezones.forEach((item, index) => {
                const clockDiv = document.createElement('div');
                clockDiv.className = 'clock';
                clockDiv.id = `clock-${index}`;
                
                const removeBtn = customTimezones.includes(item) ? 
                    `<button style="margin-top: 10px; padding: 5px 15px; font-size: 0.8em;" onclick="removeTimezone('${item.tz}')">Remove</button>` : 
                    '';

                clockDiv.innerHTML = `
                    <div class="timezone-name">${item.name}</div>
                    <div class="time-display" id="time-${index}">--:--:--</div>
                    <div class="date-display" id="date-${index}">Loading...</div>
                    ${removeBtn}
                `;

                container.appendChild(clockDiv);
            });
        }

        // Update all clocks
        function updateClocks() {
            const allTimezones = [...defaultTimezones, ...customTimezones];

            allTimezones.forEach((item, index) => {
                const now = new Date().toLocaleString('en-US', {
                    timeZone: item.tz,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const date = new Date().toLocaleString('en-US', {
                    timeZone: item.tz,
                    weekday: 'short',
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                });

                const timeElement = document.getElementById(`time-${index}`);
                const dateElement = document.getElementById(`date-${index}`);

                if (timeElement) timeElement.textContent = now;
                if (dateElement) dateElement.textContent = date;
            });
        }

        // Add custom timezone
        function addCustomTimezone() {
            const name = prompt('Enter city/location name:');
            if (!name) return;

            const tz = prompt('Enter IANA timezone (e.g., Europe/Paris, America/Chicago):\nSee: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones');
            if (!tz) return;

            // Validate timezone
            try {
                new Date().toLocaleString('en-US', { timeZone: tz });
                customTimezones.push({ name, tz });
                saveCustomTimezones();
                renderClocks();
                updateClocks();
            } catch (e) {
                alert('Invalid timezone. Please use a valid IANA timezone.');
            }
        }

        // Remove custom timezone
        function removeTimezone(tz) {
            customTimezones = customTimezones.filter(item => item.tz !== tz);
            saveCustomTimezones();
            renderClocks();
            updateClocks();
        }

        // Save custom timezones to localStorage
        function saveCustomTimezones() {
            localStorage.setItem('customTimezones', JSON.stringify(customTimezones));
        }

        // Load custom timezones from localStorage
        function loadCustomTimezones() {
            const saved = localStorage.getItem('customTimezones');
            if (saved) {
                try {
                    customTimezones = JSON.parse(saved);
                } catch (e) {
                    customTimezones = [];
                }
            }
        }

        // Reset to default
        function resetToDefault() {
            if (confirm('Reset to default timezones?')) {
                customTimezones = [];
                localStorage.removeItem('customTimezones');
                renderClocks();
                updateClocks();
            }
        }

        // Start the app
        init();
    </script>
</body>
</html>
